<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>赵羽彤工作室 · 饰品商店</title>
  <meta name="theme-color" content="#f6f6f3">
  <link rel="manifest" href="../../manifest.webmanifest?v=20260708a">
  <link rel="icon" href="../../icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../../icon.svg">
  <link rel="stylesheet" href="../../style.css?v=20260708a">
</head>
<body>
  <main class="app-shell studio-shell">
    <header class="hero studio-hero">
      <div class="hero-head">
        <p class="eyebrow">SHOP</p>
        <div class="hero-mark">JEWELRY</div>
      </div>
      <nav class="subsite-nav" aria-label="站点导航">
        <a class="subsite-link" href="/">首页</a>
        <a class="subsite-link" href="/jewelry/">饰品</a>
        <a class="subsite-link is-active" href="/jewelry/shop/">商店</a>
      </nav>
      <h1>商店板块</h1>
      <p class="hero-copy">这里先作为商店入口占位。下一轮接具体商品、定制说明、价格结构和下单方式。</p>
    </header>

    <section class="panel studio-panel">
      <div class="panel-head"><h2>准备接入的内容</h2></div>
      <div class="studio-jewelry-grid">
        <article class="studio-mini-card">
          <p class="block-label">商品卡</p>
          <p>名称、材质、尺寸、佩戴说明、状态与价格。</p>
        </article>
        <article class="studio-mini-card">
          <p class="block-label">定制说明</p>
          <p>适合谁、需要提供什么信息、交付周期与修改范围。</p>
        </article>
        <article class="studio-mini-card">
          <p class="block-label">预约入口</p>
          <p>先用固定联系或表单入口，不急着上线完整购物车。</p>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
