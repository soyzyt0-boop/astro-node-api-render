<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>赵羽彤工作室 · 提交资料</title>
  <meta name="theme-color" content="#f6f6f3">
  <link rel="manifest" href="../../../manifest.webmanifest?v=20260708a">
  <link rel="icon" href="../../../icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../../../icon.svg">
  <link rel="stylesheet" href="../../../style.css?v=20260708a">
</head>
<body>
  <main class="app-shell studio-shell">
    <header class="hero studio-hero">
      <div class="hero-head">
        <p class="eyebrow">SUBMIT</p>
        <div class="hero-mark">READING REPORTS</div>
      </div>
      <nav class="subsite-nav" aria-label="站点导航">
        <a class="subsite-link" href="/">首页</a>
        <a class="subsite-link" href="/reading/">排盘</a>
        <a class="subsite-link" href="/reading/reports/">命理报告</a>
        <a class="subsite-link is-active" href="/reading/reports/submit/">提交资料</a>
      </nav>
      <h1>提交资料</h1>
      <p class="hero-copy">这一步先把收单结构立住。你可以先整理一份完整资料，再进入正式预约。</p>
    </header>

    <section class="panel studio-panel">
      <div class="panel-head"><h2>需要准备</h2></div>
      <div class="report-submit-grid">
        <article class="studio-mini-card">
          <p class="block-label">出生资料</p>
          <p>姓名、出生日期、出生时间、出生城市。</p>
        </article>
        <article class="studio-mini-card">
          <p class="block-label">问题主题</p>
          <p>尽量只提交一个真正要解决的主题，不要把所有问题混成一团。</p>
        </article>
        <article class="studio-mini-card">
          <p class="block-label">辅助说明</p>
          <p>如果你已经自己排盘并看出疑点，把疑点一起写上来会更有效。</p>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
