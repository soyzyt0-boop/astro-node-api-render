      <h1>毛线球系列</h1>
      <p class="hero-copy">通过缠绕、牵引、卷聚与承压，把柔软材料转成有重量的结构语言。</p>
    </header>

    <section class="panel studio-panel">
      <div class="panel-head"><h2>系列定位</h2></div>
      <div class="diary-intro-grid">
        <article class="diary-lead-card">
          <p>《毛线球》处理的不是柔软材料的温和感，而是柔软之物如何在缠绕、卷聚、牵引和堆积中获得结构上的重量。和《日记》相比，它更少叙事，更少日常切口，但形式上更集中，也更容易推进成稳定的视觉语言。</p>
        </article>
        <div class="diary-meta-stack">
          <article class="studio-mini-card">
            <p class="block-label">关键词</p>
            <p>缠绕、拉扯、卷聚、柔软承压、形式集中、结构语言。</p>
          </article>
        </div>
      </div>
    </section>

    <section class="panel studio-panel">
      <div class="panel-head"><h2>继续查看</h2></div>
