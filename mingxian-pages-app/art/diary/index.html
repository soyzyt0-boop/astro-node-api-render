<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>赵羽彤工作室 · 日记系列</title>
  <meta name="theme-color" content="#f6f6f3">
  <link rel="manifest" href="../../manifest.webmanifest?v=20260708a">
  <link rel="icon" href="../../icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../../icon.svg">
  <link rel="stylesheet" href="../../style.css?v=20260708a">
</head>
<body>
  <main class="app-shell studio-shell">
    <header class="hero studio-hero">
      <div class="hero-head">
        <p class="eyebrow">ART SERIES</p>
        <div class="hero-mark">DIARY</div>
      </div>
      <nav class="subsite-nav" aria-label="站点导航">
        <a class="subsite-link" href="/">首页</a>
        <a class="subsite-link" href="/art/">艺术</a>
        <a class="subsite-link is-active" href="/art/diary/">日记系列</a>
      </nav>
      <h1>日记系列</h1>
      <p class="hero-copy">从日常经验、心理切片与现实错位进入，把生活内部最有压强的部分凝成图像。</p>
    </header>

    <section class="panel studio-panel">
      <div class="panel-head"><h2>系列定位</h2></div>
      <div class="diary-intro-grid">
        <article class="diary-lead-card">
          <p>《日记》不是按时间记录私人生活，而是从日常场景、对象、情绪切片与现实异常感出发，把个体经验里最有压强的部分压缩成作品。它保留生活触点，但真正重要的是现实如何在人的感知内部形成不成比例的重量、错位与荒诞。</p>
        </article>
        <div class="diary-meta-stack">
          <article class="studio-mini-card">
            <p class="block-label">关键词</p>
            <p>日常、错位、压缩、荒诞、现实切片、图像叙事。</p>
          </article>
        </div>
      </div>
    </section>

    <section class="panel studio-panel">
      <div class="panel-head"><h2>继续查看</h2></div>
      <div class="studio-button-row">
        <a class="studio-link-button" href="/studio/archive/diary/">打开现有系列页</a>
      </div>
    </section>
  </main>

</html>
