<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>赵羽彤工作室 · 发送站内消息</title>
  <meta name="theme-color" content="#f6f6f3">
  <link rel="manifest" href="../../manifest.webmanifest?v=20260708c">
  <link rel="icon" href="../../icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../../icon.svg">
  <link rel="stylesheet" href="../../style.css?v=20260708c">
</head>
<body>
  <main class="app-shell studio-shell">
    <header class="hero studio-hero">
      <div class="hero-head">
        <p class="eyebrow">ADMIN</p>
        <div class="hero-mark">ZHAO YUTONG STUDIO</div>
      </div>
      <nav class="subsite-nav" aria-label="站点导航">
        <a class="subsite-link" href="/">首页</a>
        <a class="subsite-link" href="/account/dashboard/">我的资料</a>
        <a class="subsite-link" href="/account/inbox/">站内消息</a>
        <a class="subsite-link is-active" href="/account/admin-messages/">后台发信</a>
      </nav>
      <h1>后台发站内消息</h1>
      <p class="hero-copy">输入用户邮箱、标题和正文，把消息送到该用户的站内收件箱。</p>
    </header>

    <section class="panel studio-panel">
      <div class="auth-card admin-search-card">
        <div class="panel-head"><h2>找用户</h2></div>
        <div class="auth-form">
          <label class="field"><span>邮箱 / 昵称 / 姓名</span><input id="admin-user-query" type="text" placeholder="输入关键词"></label>
          <div class="studio-button-row">
            <button class="studio-link-button" id="admin-user-search" type="button">搜索用户</button>
          </div>
        </div>
        <div id="admin-user-results" class="member-record-list"></div>
      </div>

      <form id="admin-message-form" class="auth-form auth-card">
        <label class="field"><span>用户邮箱</span><input name="email" type="email" required></label>
        <label class="field">
          <span>消息类型</span>
          <select name="type">
            <option value="system">系统通知</option>
            <option value="jewelry">饰品推荐</option>
            <option value="custom">私人订制</option>
          </select>
        </label>
        <label class="field"><span>标题</span><input name="title" type="text" maxlength="120" required></label>
        <label class="field"><span>正文</span><textarea name="body" rows="6" maxlength="3000" required></textarea></label>
        <div class="studio-button-row">
          <button class="studio-link-button" type="submit">发送站内消息</button>
        </div>
      </form>
      <p class="mini-meaning" id="admin-message-note"></p>

      <div class="auth-card">
        <div class="panel-head"><h2>最近发送</h2></div>
        <div id="admin-message-history" class="member-record-list"></div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const form = document.getElementById("admin-message-form");
      const note = document.getElementById("admin-message-note");
      const queryInput = document.getElementById("admin-user-query");
      const searchButton = document.getElementById("admin-user-search");
      const resultsHost = document.getElementById("admin-user-results");
      const historyHost = document.getElementById("admin-message-history");
      const readJson = async (response, fallback) => {
        const raw = await response.text();
        if (!raw) throw new Error(fallback);
        try {
          return JSON.parse(raw);
        } catch {
          throw new Error(fallback);
        }
      };

      const renderResults = (users) => {
        if (!resultsHost) return;
        if (!Array.isArray(users) || !users.length) {
          resultsHost.innerHTML = '<p class="member-record-empty">还没有匹配用户。</p>';
          return;
        }
        resultsHost.innerHTML = users.map((user) => `
          <article class="member-record-card admin-user-card">
            <strong>${user.displayName || user.fullName || user.email}</strong>
            <p>${user.email}</p>
            <div class="studio-button-row">
              <button class="studio-link-button" type="button" data-pick-email="${user.email}">带入发信</button>
            </div>
          </article>
        `).join("");
      };

      const renderHistory = (items) => {
        if (!historyHost) return;
        if (!Array.isArray(items) || !items.length) {
          historyHost.innerHTML = '<p class="member-record-empty">还没有发送记录。</p>';
          return;
        }
        historyHost.innerHTML = items.map((item) => `
          <article class="member-record-card">
            <div class="message-head">
              <strong>${item.title || "未命名消息"}</strong>
              <span class="message-state">${item.readAt ? "对方已读" : "对方未读"}</span>
            </div>
            <p class="message-type-chip">${item.typeLabel || "系统通知"}</p>
            <p>${item.displayName || item.email}</p>
            <p class="member-record-meta">${item.email} · ${new Date(Number(item.createdAt || Date.now())).toLocaleString("zh-CN")}</p>
          </article>
        `).join("");
      };

      const loadAdminData = async (query = "") => {
        const response = await fetch(`/api/admin/messages${query ? `?q=${encodeURIComponent(query)}` : ""}`, {
          credentials: "same-origin",
          cache: "no-store",
        });
        const data = await readJson(response, "读取后台数据失败。");
        if (!response.ok || !data.ok) throw new Error(data.error || "读取后台数据失败。");
        renderResults(data.users || []);
        renderHistory(data.recent || []);
      };

      searchButton?.addEventListener("click", async () => {
        note.textContent = "";
        try {
          await loadAdminData(String(queryInput?.value || "").trim());
        } catch (error) {
          note.textContent = error instanceof Error ? error.message : "搜索失败。";
        }
      });

      resultsHost?.addEventListener("click", (event) => {
        const button = event.target.closest("[data-pick-email]");
        if (!button) return;
        const email = button.getAttribute("data-pick-email") || "";
        const emailInput = form?.querySelector('[name="email"]');
        if (emailInput) emailInput.value = email;
      });

      form?.addEventListener("submit", async (event) => {
        event.preventDefault();
        note.textContent = "正在发送。";
        const formData = new FormData(form);
        try {
          const response = await fetch("/api/admin/messages", {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: formData.get("email"),
              type: formData.get("type"),
              title: formData.get("title"),
              body: formData.get("body"),
            }),
          });
          const data = await readJson(response, "发送失败。");
          if (!response.ok || !data.ok) throw new Error(data.error || "发送失败。");
          note.textContent = "已发送到用户站内收件箱。";
          renderHistory(data.recent || []);
          form.reset();
        } catch (error) {
          note.textContent = error instanceof Error ? error.message : "发送失败。";
        }
      });

      loadAdminData().catch((error) => {
        note.textContent = error instanceof Error ? error.message : "读取后台数据失败。";
      });
    })();
  </script>
</body>
</html>
