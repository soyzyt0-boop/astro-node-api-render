<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>赵羽彤工作室 · 账户</title>
  <meta name="theme-color" content="#f6f6f3">
  <link rel="manifest" href="../manifest.webmanifest?v=20260708b">
  <link rel="icon" href="../icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../icon.svg">
  <link rel="stylesheet" href="../style.css?v=20260708b">
</head>
<body>
  <main class="app-shell studio-shell">
    <header class="hero studio-hero">
      <div class="hero-head">
        <p class="eyebrow">ACCOUNT</p>
        <div class="hero-mark">ZHAO YUTONG STUDIO</div>
      </div>
      <nav class="subsite-nav" aria-label="站点导航">
        <a class="subsite-link" href="/">首页</a>
        <a class="subsite-link" href="/reading/">排盘</a>
        <a class="subsite-link" href="/jewelry/">饰品</a>
        <a class="subsite-link" href="/art/">艺术</a>
        <a class="subsite-link is-active" href="/account/">账户</a>
      </nav>
      <h1>账户</h1>
      <p class="hero-copy">注册后，排盘资料、个人档案和后续留档只归当前账号自己可见。</p>
    </header>

    <section class="panel studio-panel auth-shell">
      <div class="auth-grid">
        <article class="auth-card">
          <div class="panel-head"><h2>注册</h2></div>
          <form id="register-form" class="auth-form">
            <label class="field"><span>邮箱</span><input name="email" type="email" required></label>
            <label class="field password-field">
              <span>密码</span>
              <div class="password-row password-row-inline">
                <input name="password" type="password" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" minlength="6" placeholder="6位数字" required>
                <button class="password-toggle" type="button" data-toggle-password="password"></button>
              </div>
            </label>
            <label class="field password-field">
              <span>验证密码</span>
              <div class="password-row password-row-inline">
                <input name="confirmPassword" type="password" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" minlength="6" placeholder="再次输入6位数字" required>
                <button class="password-toggle" type="button" data-toggle-password="confirmPassword"></button>
              </div>
            </label>
            <label class="field"><span>昵称</span><input name="displayName" type="text" placeholder="前台显示名"></label>
            <div class="studio-button-row">
              <button class="studio-link-button" type="submit">注册并登录</button>
            </div>
          </form>
          <p class="mini-meaning" id="register-note"></p>
        </article>

        <article class="auth-card">
          <div class="panel-head"><h2>登录</h2></div>
          <form id="login-form" class="auth-form">
            <label class="field"><span>邮箱</span><input name="email" type="email" required></label>
            <label class="field password-field">
              <span>密码</span>
              <div class="password-row password-row-inline">
                <input name="loginPassword" type="password" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" minlength="6" placeholder="6位数字" required>
                <button class="password-toggle" type="button" data-toggle-login-password="loginPassword"></button>
              </div>
            </label>
            <div class="studio-button-row">
              <button class="studio-link-button" type="submit">登录</button>
            </div>
          </form>
          <p class="mini-meaning" id="login-note"></p>
        </article>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const registerForm = document.getElementById("register-form");
      const loginForm = document.getElementById("login-form");
      const registerNote = document.getElementById("register-note");
      const loginNote = document.getElementById("login-note");
      const passwordToggles = Array.from(document.querySelectorAll("[data-toggle-password]"));
      const loginPasswordToggles = Array.from(document.querySelectorAll("[data-toggle-login-password]"));

      const readJson = async (response, fallback) => {
        const raw = await response.text();
        if (!raw) throw new Error(fallback);
        try {
          return JSON.parse(raw);
        } catch {
          throw new Error(fallback);
        }
      };

      passwordToggles.forEach((button) => {
        button.addEventListener("click", () => {
          const fieldName = button.getAttribute("data-toggle-password");
          const input = registerForm?.querySelector(`[name="${fieldName}"]`);
          if (!input) return;
          input.type = input.type === "password" ? "text" : "password";
        });
      });

      loginPasswordToggles.forEach((button) => {
        button.addEventListener("click", () => {
          const fieldName = button.getAttribute("data-toggle-login-password");
          const input = loginForm?.querySelector(`[name="${fieldName}"]`);
          if (!input) return;
          input.type = input.type === "password" ? "text" : "password";
        });
      });

      registerForm?.addEventListener("submit", async (event) => {
        event.preventDefault();
        registerNote.textContent = "正在注册。";
        const form = new FormData(registerForm);
        const password = String(form.get("password") || "");
        const confirmPassword = String(form.get("confirmPassword") || "");
        if (!/^\d{6}$/.test(password)) {
          registerNote.textContent = "密码必须是 6 位数字。";
          return;
        }
        if (password !== confirmPassword) {
          registerNote.textContent = "两次密码不一致。";
          return;
        }
        const payload = {
          email: form.get("email"),
          password,
          displayName: form.get("displayName"),
        };
        try {
          const response = await fetch("/api/auth/register", {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await readJson(response, "注册失败。");
          if (!response.ok || !data.ok) throw new Error(data.error || "注册失败。");
          registerNote.textContent = "注册成功，正在进入账户页。";
          window.location.href = "/account/dashboard/";
        } catch (error) {
          registerNote.textContent = error instanceof Error ? error.message : "注册失败。";
        }
      });

      loginForm?.addEventListener("submit", async (event) => {
        event.preventDefault();
        const form = new FormData(loginForm);
        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: form.get("email"),
              password: form.get("loginPassword"),
            }),
          });
          const data = await readJson(response, "登录失败。");
          if (!response.ok || !data.ok) throw new Error(data.error || "登录失败。");
          window.location.href = "/account/dashboard/";
        } catch (error) {
          if (loginNote) loginNote.textContent = error instanceof Error ? error.message : "登录失败。";
        }
      });
    })();
  </script>
</body>
</html>
